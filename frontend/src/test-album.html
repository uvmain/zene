<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Component Test</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom colors to match the app */
        .bg-zene-600 { background-color: #872341; }
        .bg-zene-700 { background-color: #544F57; }
        .text-zene-200 { color: #F05941; }
    </style>
</head>
<body class="bg-gray-900 text-white p-4">
    <div id="app">
        <h1 class="text-3xl mb-8">Album Component Mobile Responsiveness Test</h1>
        
        <div class="mb-8">
            <h2 class="text-xl mb-4">Large Size (lg) - Used in lists</h2>
            <div class="flex flex-wrap gap-6">
                <album-component v-for="album in sampleAlbums" 
                    :key="album.musicbrainz_album_id" 
                    :album="album" 
                    size="lg">
                </album-component>
            </div>
        </div>
        
        <div class="mb-8">
            <h2 class="text-xl mb-4">Extra Large Size (xl) - Used in hero sections</h2>
            <album-component :album="sampleAlbums[0]" size="xl"></album-component>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        // Mock Album component based on the original
        const AlbumComponent = {
            props: {
                album: { type: Object, required: true },
                size: { type: String, default: 'md' }
            },
            methods: {
                onImageError(event) {
                    const target = event.target;
                    target.onerror = null;
                    target.src = '/default-square.png';
                },
                navigateAlbum() {
                    console.log('Navigate to album:', this.album.album);
                },
                navigateArtist() {
                    console.log('Navigate to artist:', this.album.artist);
                }
            },
            computed: {
                artistAndDate() {
                    return this.album.release_date !== 'Invalid Date' ? 
                        `${this.album.artist} • ${this.album.release_date}` : 
                        this.album.artist;
                }
            },
            template: `
                <div v-if="size === 'lg'" class="h-32 w-24 md:h-40 md:w-32">
                    <img class="w-24 h-24 md:w-32 md:h-32 cursor-pointer rounded-lg object-cover" 
                         :src="album.image_url" 
                         alt="Album Cover" 
                         @error="onImageError" 
                         @click="navigateAlbum()" />
                    <div class="w-24 md:w-32 truncate whitespace-nowrap text-xs md:text-sm">
                        {{ album.album }}
                    </div>
                    <div class="w-24 md:w-32 cursor-pointer truncate whitespace-nowrap text-xs text-gray-300" 
                         @click="navigateArtist()">
                        {{ artistAndDate }}
                    </div>
                </div>
                <div v-else-if="size === 'xl'" class="h-full flex flex-col md:flex-row items-center gap-4 md:gap-6 bg-gradient-to-r from-purple-600/90 via-purple-600/80 p-4 md:p-10">
                    <img :src="album.image_url" 
                         class="w-32 h-32 md:w-48 md:h-48 cursor-pointer rounded-lg object-cover" 
                         @error="onImageError" 
                         @click="navigateAlbum()">
                    <div class="flex flex-col gap-3 md:gap-5 text-center md:text-left">
                        <div class="cursor-pointer text-xl md:text-4xl text-white font-bold" @click="navigateAlbum()">
                            {{ album.album }}
                        </div>
                        <div class="cursor-pointer text-sm md:text-xl text-white" @click="navigateArtist()">
                            {{ artistAndDate }}
                        </div>
                        <div v-if="album.genres && album.genres.length > 0" class="flex flex-wrap gap-2 justify-center md:justify-start">
                            <span v-for="genre in album.genres" :key="genre" 
                                  class="px-2 py-1 bg-gray-700 rounded text-sm">
                                {{ genre }}
                            </span>
                        </div>
                        <div class="flex justify-center md:justify-start">
                            <button class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
                                Play Album
                            </button>
                        </div>
                    </div>
                </div>
            `
        };

        createApp({
            components: {
                AlbumComponent
            },
            data() {
                return {
                    sampleAlbums: [
                        {
                            musicbrainz_album_id: '1',
                            album: 'Kind of Blue',
                            artist: 'Miles Davis',
                            release_date: '1959',
                            image_url: 'https://via.placeholder.com/300x300/4F46E5/ffffff?text=Album+1',
                            genres: ['Jazz', 'Modal Jazz']
                        },
                        {
                            musicbrainz_album_id: '2',
                            album: 'The Dark Side of the Moon',
                            artist: 'Pink Floyd',
                            release_date: '1973',
                            image_url: 'https://via.placeholder.com/300x300/7C3AED/ffffff?text=Album+2',
                            genres: ['Progressive Rock', 'Psychedelic Rock']
                        },
                        {
                            musicbrainz_album_id: '3',
                            album: 'Abbey Road',
                            artist: 'The Beatles',
                            release_date: '1969',
                            image_url: 'https://via.placeholder.com/300x300/DC2626/ffffff?text=Album+3',
                            genres: ['Rock', 'Pop']
                        },
                        {
                            musicbrainz_album_id: '4',
                            album: 'Thriller',
                            artist: 'Michael Jackson',
                            release_date: '1982',
                            image_url: 'https://via.placeholder.com/300x300/059669/ffffff?text=Album+4',
                            genres: ['Pop', 'R&B']
                        }
                    ]
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
